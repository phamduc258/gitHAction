name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            Review pull request #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            This workflow runs on every push to the PR — previous reviews may already exist.
            You MUST follow the deduplication rules in CLAUDE.md.

            MANDATORY workflow:

            1. Read CLAUDE.md — pay special attention to "Review axes", "Inline comment format", "Scoring", "Machine-readable footer", and "Deduplication" sections.

            2. Fetch existing review state:
               a. Existing inline comments:
                  `gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments" --jq '.[] | {file: .path, line: (.line // .original_line), body: (.body | .[0:80])}'`
                  → Build an internal map of `(file, line)` already commented.
               b. Existing summary comment by SLACK_BRIEF marker:
                  `gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" --jq '[.[] | select(.body | contains("<!-- SLACK_BRIEF"))] | last | {id, body}'`
                  → Save the comment id if present (you will EDIT it, not create a new one).

            3. Inspect the PR diff:
               `gh pr diff ${{ github.event.pull_request.number }}`

            4. For EACH issue found:
               - Skip if `(file, line)` is already in the dedup map.
               - Otherwise, call `mcp__github_inline_comment__create_inline_comment`. Format the body as:
                 `<severity_emoji> [<axis>] <message>`
                 - severity: `:red_circle:` / `:yellow_circle:` / `:large_blue_circle:`
                 - axis: `[Bugs]`, `[Security]`, `[Performance]`, or `[Maintainability]`

            5. Compute one score per axis (0-100 integer) using the formula in CLAUDE.md:
               `axis_score = max(0, 100 - critical_in_axis*20 - warning_in_axis*5 - info_in_axis*1)`
               Count includes BOTH new findings from this run AND existing inline comments from previous runs (the total state of the PR).

            6. Post or update the summary:
               - If step 2b found an existing id, EDIT it:
                 `gh api -X PATCH "repos/${{ github.repository }}/issues/comments/<id>" -f body="<new summary>"`
               - Otherwise create new:
                 `gh pr comment ${{ github.event.pull_request.number }} --body "<summary>"`
               - Body MUST end with the SLACK_BRIEF footer in EXACTLY this format (lowercase keys, integer values, all 8 keys present):

                 ```
                 <!-- SLACK_BRIEF
                 verdict: REQUEST_CHANGES
                 critical: 4
                 warning: 5
                 info: 6
                 score_bugs: 40
                 score_security: 15
                 score_performance: 65
                 score_maintainability: 82
                 -->
                 ```

                 (Replace values with actual review data. If an axis has no findings → `score_<axis>: 100`.)

            Skip lockfiles, generated files, binaries.

            A failed review is one where you (a) post a duplicate inline comment on a previously-commented `(file, line)`, or (b) create a second summary comment instead of editing the existing one, or (c) skip the SLACK_BRIEF footer block, or (d) deviate from the exact 8-key SLACK_BRIEF format, or (e) forget to tag any inline comment with its axis.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 30
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh api:*),Read,Glob,Grep"

  notify:
    needs: review
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Extract review brief and compute overall score
        id: brief
        if: needs.review.result == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e

          # Find the latest PR comment containing the SLACK_BRIEF HTML marker.
          # Use literal "<!-- SLACK_BRIEF" to avoid matching the track_progress comment
          # which mentions SLACK_BRIEF in plain text.
          body=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '[.[] | select(.body | contains("<!-- SLACK_BRIEF"))] | last | .body // empty')

          if [ -z "$body" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No PR comment with <!-- SLACK_BRIEF marker found"
            exit 0
          fi

          brief=$(awk '/<!-- *SLACK_BRIEF/,/-->/' <<< "$body")

          echo "::group::Debug — comment body (first 500 chars)"
          printf '%s\n' "${body:0:500}"
          echo "::endgroup::"
          echo "::group::Debug — extracted SLACK_BRIEF block"
          printf '%s\n' "$brief"
          echo "::endgroup::"

          extract() {
            grep -oP "(?i)^\s*$1\s*:\s*\K.*" <<< "$brief" | head -1 | sed 's/[[:space:]]*$//'
          }

          verdict=$(extract verdict)
          critical=$(extract critical)
          warning=$(extract warning)
          info=$(extract info)
          score_bugs=$(extract score_bugs)
          score_security=$(extract score_security)
          score_performance=$(extract score_performance)
          score_maintainability=$(extract score_maintainability)

          # Defaults if any axis score missing
          score_bugs=${score_bugs:-0}
          score_security=${score_security:-0}
          score_performance=${score_performance:-0}
          score_maintainability=${score_maintainability:-0}

          # Overall = weighted average (Bugs 35% / Security 30% / Performance 20% / Maintainability 15%)
          overall=$(python3 -c "print(round(0.35*$score_bugs + 0.30*$score_security + 0.20*$score_performance + 0.15*$score_maintainability))")

          # Letter grade from overall
          if   [ "$overall" -ge 90 ]; then grade="A"
          elif [ "$overall" -ge 80 ]; then grade="B"
          elif [ "$overall" -ge 70 ]; then grade="C"
          elif [ "$overall" -ge 60 ]; then grade="D"
          else                              grade="F"
          fi

          # Per-axis indicator emoji (Slack shortcodes — :large_yellow_circle: is what works in Slack)
          axis_emoji() {
            local s=$1
            if   [ "$s" -ge 80 ]; then echo ":large_green_circle:"
            elif [ "$s" -ge 60 ]; then echo ":large_yellow_circle:"
            else                       echo ":red_circle:"
            fi
          }

          emoji_bugs=$(axis_emoji "$score_bugs")
          emoji_security=$(axis_emoji "$score_security")
          emoji_performance=$(axis_emoji "$score_performance")
          emoji_maintainability=$(axis_emoji "$score_maintainability")
          overall_emoji=$(axis_emoji "$overall")

          case "$verdict" in
            APPROVE)         verdict_emoji=":large_green_circle:"; verdict_text="Approved" ;;
            COMMENT)         verdict_emoji=":large_yellow_circle:"; verdict_text="Comments" ;;
            REQUEST_CHANGES) verdict_emoji=":red_circle:"; verdict_text="Changes Requested" ;;
            *)               verdict_emoji=":grey_question:"; verdict_text="${verdict:-Unknown}" ;;
          esac

          {
            echo "found=true"
            echo "verdict=$verdict"
            echo "verdict_text=$verdict_text"
            echo "verdict_emoji=$verdict_emoji"
            echo "critical=${critical:-0}"
            echo "warning=${warning:-0}"
            echo "info=${info:-0}"
            echo "score_bugs=$score_bugs"
            echo "score_security=$score_security"
            echo "score_performance=$score_performance"
            echo "score_maintainability=$score_maintainability"
            echo "emoji_bugs=$emoji_bugs"
            echo "emoji_security=$emoji_security"
            echo "emoji_performance=$emoji_performance"
            echo "emoji_maintainability=$emoji_maintainability"
            echo "overall=$overall"
            echo "overall_emoji=$overall_emoji"
            echo "grade=$grade"
          } >> "$GITHUB_OUTPUT"

          echo "::group::Computed scores"
          echo "Bugs:           $score_bugs $emoji_bugs"
          echo "Security:       $score_security $emoji_security"
          echo "Performance:    $score_performance $emoji_performance"
          echo "Maintainability: $score_maintainability $emoji_maintainability"
          echo "Overall:        $overall ($grade) $overall_emoji"
          echo "::endgroup::"

      - name: Send Slack message
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": ":robot_face: Claude Code Review Complete",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<@U03CKA3NG3W> heads up: *${{ steps.brief.outputs.verdict_emoji || ':white_check_mark:' }} ${{ steps.brief.outputs.verdict_text || (needs.review.result == 'success' && 'Reviewed' || 'Review failed') }}* on <${{ github.event.pull_request.html_url }}|#${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}>"
                  }
                },
                {
                  "type": "divider"
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Overall: ${{ steps.brief.outputs.grade || '—' }} (${{ steps.brief.outputs.overall || '—' }}/100)* ${{ steps.brief.outputs.overall_emoji || '' }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "${{ steps.brief.outputs.emoji_bugs || ':grey_question:' }} *Bugs*\n${{ steps.brief.outputs.score_bugs || '—' }}/100"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "${{ steps.brief.outputs.emoji_security || ':grey_question:' }} *Security*\n${{ steps.brief.outputs.score_security || '—' }}/100"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "${{ steps.brief.outputs.emoji_performance || ':grey_question:' }} *Performance*\n${{ steps.brief.outputs.score_performance || '—' }}/100"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "${{ steps.brief.outputs.emoji_maintainability || ':grey_question:' }} *Maintainability*\n${{ steps.brief.outputs.score_maintainability || '—' }}/100"
                    }
                  ]
                },
                {
                  "type": "divider"
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*:red_circle: Critical*\n${{ steps.brief.outputs.critical || '—' }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*:large_yellow_circle: Warning*\n${{ steps.brief.outputs.warning || '—' }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*:large_blue_circle: Info*\n${{ steps.brief.outputs.info || '—' }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author*\n${{ github.event.pull_request.user.login }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "Open Pull Request",
                        "emoji": true
                      },
                      "url": "${{ github.event.pull_request.html_url }}",
                      "style": "${{ steps.brief.outputs.verdict == 'REQUEST_CHANGES' && 'danger' || 'primary' }}"
                    }
                  ]
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "Repo: `${{ github.repository }}` • Branch: `${{ github.event.pull_request.head.ref }}` → `${{ github.event.pull_request.base.ref }}`"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
