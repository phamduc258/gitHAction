name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            Review pull request #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            MANDATORY workflow:
            1. Read CLAUDE.md to load review rules.
            2. Run `gh pr diff ${{ github.event.pull_request.number }}` to see the diff.
            3. For EACH issue found, you MUST call `mcp__github_inline_comment__create_inline_comment` with the file path, line number, and a comment prefixed by severity emoji (:red_circle: critical, :large_yellow_circle: warning, :large_blue_circle: info). Do NOT just describe issues in your response — post them as actual inline comments via the tool.
            4. After all inline comments, post a summary by running `gh pr comment ${{ github.event.pull_request.number }} --body "<summary>"` containing:
               - Counts per severity
               - Top 3 issues
               - Verdict: APPROVE / COMMENT / REQUEST_CHANGES

            Skip lockfiles, generated files, binaries.

            A response without posting any inline comments AND a summary comment is a failed review.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 25
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Read,Glob,Grep"

  notify:
    needs: review
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack message
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": ":robot_face: Claude Code Review Complete",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*<${{ github.event.pull_request.html_url }}|#${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}>*"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repo:*\n`${{ github.repository }}`"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.event.pull_request.user.login }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n`${{ github.event.pull_request.head.ref }}` → `${{ github.event.pull_request.base.ref }}`"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Status:*\n${{ needs.review.result == 'success' && ':white_check_mark: Reviewed' || ':x: Review failed' }}"
                    }
                  ]
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "Open the PR to see Claude's inline comments and summary review."
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
