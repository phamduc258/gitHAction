name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            Review pull request #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            This workflow runs on every push to the PR — previous reviews may already exist.
            You MUST follow the deduplication rules in CLAUDE.md.

            MANDATORY workflow:

            1. Read CLAUDE.md — pay special attention to "Review axes", "Inline comment format", "Scoring", "Machine-readable footer", and "Deduplication" sections.

            2. Fetch existing review state:
               a. Existing inline comments:
                  `gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments" --jq '.[] | {file: .path, line: (.line // .original_line), body: (.body | .[0:80])}'`
                  → Build an internal map of `(file, line)` already commented.
               b. Existing summary comment by SLACK_BRIEF marker:
                  `gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" --jq '[.[] | select(.body | contains("<!-- SLACK_BRIEF"))] | last | {id, body}'`
                  → Save the comment id if present (you will EDIT it, not create a new one).

            3. Inspect the PR diff:
               `gh pr diff ${{ github.event.pull_request.number }}`

            4. For EACH issue found:
               - Skip if `(file, line)` is already in the dedup map.
               - Otherwise, call `mcp__github_inline_comment__create_inline_comment`. Format the body as:
                 `<severity_emoji> [<axis>] <message>`

            5. Compute one score per axis (0-100 integer) using the formula in CLAUDE.md.

            6. Post or update the summary:
               - If step 2b found an existing id, EDIT it via `gh api -X PATCH`.
               - Otherwise create new via `gh pr comment`.
               - Body MUST end with the SLACK_BRIEF footer in EXACTLY this format (lowercase keys, integer scores, ALL 9 keys including `summary`):

                 ```
                 <!-- SLACK_BRIEF
                 verdict: REQUEST_CHANGES
                 critical: 4
                 warning: 5
                 info: 6
                 score_bugs: 40
                 score_security: 15
                 score_performance: 65
                 score_maintainability: 82
                 summary: SQL injection in PaymentProcessor and a sync-over-async deadlock are blockers. Fix these before re-review.
                 -->
                 ```

                 - The `summary` value is a 1-2 sentence prose TL;DR for Slack. Plain text only, no markdown, no line breaks.

            Skip lockfiles, generated files, binaries.

            A failed review is one where you (a) post a duplicate inline comment, (b) create a second summary comment instead of editing, (c) skip the SLACK_BRIEF footer, (d) deviate from the 9-key format, or (e) forget to tag any inline comment with its axis.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 30
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh api:*),Read,Glob,Grep"

  notify:
    needs: review
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      # ─────────────────────────────────────────────────────────────────
      # Step 1: Extract review brief + compute scores from PR comment
      # ─────────────────────────────────────────────────────────────────
      - name: Extract review brief and compute scores
        id: brief
        if: needs.review.result == 'success'
        run: |
          set -e

          body=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '[.[] | select(.body | contains("<!-- SLACK_BRIEF"))] | last | .body // empty')

          if [ -z "$body" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No PR comment with <!-- SLACK_BRIEF marker found"
            exit 0
          fi

          brief=$(awk '/<!-- *SLACK_BRIEF/,/-->/' <<< "$body")

          extract() {
            grep -oP "(?i)^\s*$1\s*:\s*\K.*" <<< "$brief" | head -1 | sed 's/[[:space:]]*$//'
          }

          verdict=$(extract verdict)
          critical=$(extract critical)
          warning=$(extract warning)
          info=$(extract info)
          score_bugs=$(extract score_bugs)
          score_security=$(extract score_security)
          score_performance=$(extract score_performance)
          score_maintainability=$(extract score_maintainability)
          summary=$(extract summary)

          score_bugs=${score_bugs:-0}
          score_security=${score_security:-0}
          score_performance=${score_performance:-0}
          score_maintainability=${score_maintainability:-0}

          overall=$(python3 -c "print(round(0.35*$score_bugs + 0.30*$score_security + 0.20*$score_performance + 0.15*$score_maintainability))")

          if   [ "$overall" -ge 90 ]; then grade="A"
          elif [ "$overall" -ge 80 ]; then grade="B"
          elif [ "$overall" -ge 70 ]; then grade="C"
          elif [ "$overall" -ge 60 ]; then grade="D"
          else                              grade="F"
          fi

          axis_emoji() {
            local s=$1
            if   [ "$s" -ge 80 ]; then echo ":large_green_circle:"
            elif [ "$s" -ge 60 ]; then echo ":large_yellow_circle:"
            else                       echo ":red_circle:"
            fi
          }

          case "$verdict" in
            APPROVE)         verdict_emoji=":large_green_circle:"; verdict_text="Approved" ;;
            COMMENT)         verdict_emoji=":large_yellow_circle:"; verdict_text="Comments" ;;
            REQUEST_CHANGES) verdict_emoji=":red_circle:"; verdict_text="Changes Requested" ;;
            *)               verdict_emoji=":grey_question:"; verdict_text="${verdict:-Unknown}" ;;
          esac

          {
            echo "found=true"
            echo "verdict=$verdict"
            echo "verdict_text=$verdict_text"
            echo "verdict_emoji=$verdict_emoji"
            echo "critical=${critical:-0}"
            echo "warning=${warning:-0}"
            echo "info=${info:-0}"
            echo "score_bugs=$score_bugs"
            echo "score_security=$score_security"
            echo "score_performance=$score_performance"
            echo "score_maintainability=$score_maintainability"
            echo "emoji_bugs=$(axis_emoji "$score_bugs")"
            echo "emoji_security=$(axis_emoji "$score_security")"
            echo "emoji_performance=$(axis_emoji "$score_performance")"
            echo "emoji_maintainability=$(axis_emoji "$score_maintainability")"
            echo "overall=$overall"
            echo "overall_emoji=$(axis_emoji "$overall")"
            echo "grade=$grade"
            # summary may contain special chars — use multiline output marker
            delim="EOF_$(openssl rand -hex 8)"
            echo "summary<<$delim"
            echo "${summary:-No summary provided.}"
            echo "$delim"
          } >> "$GITHUB_OUTPUT"

      # ─────────────────────────────────────────────────────────────────
      # Step 2: Find existing Slack thread tracking comment on the PR
      # ─────────────────────────────────────────────────────────────────
      - name: Look up Slack thread state
        id: thread
        if: needs.review.result == 'success'
        run: |
          set -e

          tracking=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '[.[] | select(.body | contains("<!-- SLACK_THREAD"))] | last')

          if [ -z "$tracking" ] || [ "$tracking" = "null" ]; then
            echo "is_first=true" >> "$GITHUB_OUTPUT"
            echo "review_count=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          comment_id=$(jq -r '.id' <<< "$tracking")
          body=$(jq -r '.body' <<< "$tracking")

          extract() {
            grep -oP "(?i)^\s*$1\s*:\s*\K.*" <<< "$body" | head -1 | sed 's/[[:space:]]*$//'
          }

          ts=$(extract ts)
          last_score=$(extract last_score)
          prev_count=$(extract review_count)
          new_count=$((${prev_count:-0} + 1))

          # Compute score delta vs last review
          if [ -n "$last_score" ] && [ -n "${{ steps.brief.outputs.overall }}" ]; then
            delta=$((${{ steps.brief.outputs.overall }} - last_score))
            if   [ "$delta" -gt 0 ]; then delta_text=":arrow_up: +$delta"
            elif [ "$delta" -lt 0 ]; then delta_text=":arrow_down: $delta"
            else                          delta_text="= 0"
            fi
          else
            delta_text=""
          fi

          {
            echo "is_first=false"
            echo "comment_id=$comment_id"
            echo "ts=$ts"
            echo "last_score=$last_score"
            echo "review_count=$new_count"
            echo "delta_text=$delta_text"
          } >> "$GITHUB_OUTPUT"

      # ─────────────────────────────────────────────────────────────────
      # Step 3a: First review → post NEW message in channel
      # ─────────────────────────────────────────────────────────────────
      - name: Post initial Slack message (first review)
        id: slack_initial
        if: needs.review.result == 'success' && steps.thread.outputs.is_first == 'true'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          errors: true
          payload: |
            {
              "channel": "${{ secrets.SLACK_CHANNEL_ID }}",
              "text": "Claude Code Review · #${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }} — ${{ steps.brief.outputs.verdict_text }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":robot_face: *Claude Code Review*"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":pushpin: *<${{ github.event.pull_request.html_url }}|#${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}>*"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": ":bust_in_silhouette: ${{ github.event.pull_request.user.login }}   ·   cc <@U03CKA3NG3W>"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ steps.brief.outputs.verdict_emoji }} *${{ steps.brief.outputs.verdict_text }}*   ·   :dart: *${{ steps.brief.outputs.grade }} (${{ steps.brief.outputs.overall }}/100)* ${{ steps.brief.outputs.overall_emoji }}\n:red_circle: ${{ steps.brief.outputs.critical }} critical  ·  :large_yellow_circle: ${{ steps.brief.outputs.warning }} warning  ·  :large_blue_circle: ${{ steps.brief.outputs.info }} info"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "${{ steps.brief.outputs.emoji_bugs }} *Bugs* ${{ steps.brief.outputs.score_bugs }}" },
                    { "type": "mrkdwn", "text": "${{ steps.brief.outputs.emoji_security }} *Security* ${{ steps.brief.outputs.score_security }}" },
                    { "type": "mrkdwn", "text": "${{ steps.brief.outputs.emoji_performance }} *Performance* ${{ steps.brief.outputs.score_performance }}" },
                    { "type": "mrkdwn", "text": "${{ steps.brief.outputs.emoji_maintainability }} *Maintainability* ${{ steps.brief.outputs.score_maintainability }}" }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":speech_balloon: _${{ steps.brief.outputs.summary }}_"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": ":link: View PR", "emoji": true },
                      "url": "${{ github.event.pull_request.html_url }}",
                      "style": "${{ steps.brief.outputs.verdict == 'REQUEST_CHANGES' && 'danger' || 'primary' }}"
                    }
                  ]
                }
              ]
            }

      # ─────────────────────────────────────────────────────────────────
      # Step 3b: Re-review → post REPLY in existing thread
      # ─────────────────────────────────────────────────────────────────
      - name: Post re-review reply (in thread)
        id: slack_reply
        if: needs.review.result == 'success' && steps.thread.outputs.is_first == 'false'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          errors: true
          payload: |
            {
              "channel": "${{ secrets.SLACK_CHANNEL_ID }}",
              "thread_ts": "${{ steps.thread.outputs.ts }}",
              "text": "Re-review #${{ steps.thread.outputs.review_count }} — ${{ steps.brief.outputs.verdict_text }} · ${{ steps.brief.outputs.overall }}/100",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":arrows_counterclockwise: *Re-review #${{ steps.thread.outputs.review_count }}*"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ steps.brief.outputs.verdict_emoji }} *${{ steps.brief.outputs.verdict_text }}*   ·   :dart: *${{ steps.brief.outputs.grade }} (${{ steps.brief.outputs.overall }}/100)* ${{ steps.thread.outputs.delta_text }}\n:red_circle: ${{ steps.brief.outputs.critical }} critical  ·  :large_yellow_circle: ${{ steps.brief.outputs.warning }} warning  ·  :large_blue_circle: ${{ steps.brief.outputs.info }} info"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "${{ steps.brief.outputs.emoji_bugs }} *Bugs* ${{ steps.brief.outputs.score_bugs }}" },
                    { "type": "mrkdwn", "text": "${{ steps.brief.outputs.emoji_security }} *Security* ${{ steps.brief.outputs.score_security }}" },
                    { "type": "mrkdwn", "text": "${{ steps.brief.outputs.emoji_performance }} *Performance* ${{ steps.brief.outputs.score_performance }}" },
                    { "type": "mrkdwn", "text": "${{ steps.brief.outputs.emoji_maintainability }} *Maintainability* ${{ steps.brief.outputs.score_maintainability }}" }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":speech_balloon: _${{ steps.brief.outputs.summary }}_"
                  }
                }
              ]
            }

      # ─────────────────────────────────────────────────────────────────
      # Step 4: Save Slack thread state in a hidden PR tracking comment
      # ─────────────────────────────────────────────────────────────────
      - name: Save Slack thread state
        if: needs.review.result == 'success'
        run: |
          set -e

          # Use the ts from initial post (if first) or keep existing ts (if reply)
          ts="${{ steps.slack_initial.outputs.ts || steps.thread.outputs.ts }}"
          channel="${{ steps.slack_initial.outputs.channel || secrets.SLACK_CHANNEL_ID }}"

          if [ -z "$ts" ]; then
            echo "::warning::No ts available — skip saving tracking comment"
            exit 0
          fi

          body=$(cat <<EOF
          <!-- SLACK_THREAD
          ts: $ts
          channel: $channel
          last_score: ${{ steps.brief.outputs.overall }}
          last_verdict: ${{ steps.brief.outputs.verdict }}
          review_count: ${{ steps.thread.outputs.review_count }}
          updated_at: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          -->
          EOF
          )

          if [ -n "${{ steps.thread.outputs.comment_id }}" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/${{ steps.thread.outputs.comment_id }}" -f body="$body"
            echo "Updated tracking comment ${{ steps.thread.outputs.comment_id }}"
          else
            gh api -X POST "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" -f body="$body"
            echo "Created new tracking comment with ts=$ts"
          fi
