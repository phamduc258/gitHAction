name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            Review pull request #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            This workflow runs on every push to the PR — previous reviews may already exist.
            You MUST follow the deduplication rules in CLAUDE.md to avoid posting duplicate comments.

            MANDATORY workflow:

            1. Read CLAUDE.md — pay attention to "Machine-readable footer" AND "Deduplication" sections.

            2. Fetch existing review state (build dedup maps before reviewing):
               a. Existing inline comments on this PR:
                  `gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments" --jq '.[] | {file: .path, line: (.line // .original_line), body: (.body | .[0:80])}'`
                  → Note every `(file, line)` already commented.
               b. Existing Claude summary comment (if any):
                  `gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" --jq '[.[] | select(.body | contains("SLACK_BRIEF"))] | last | {id, body}'`
                  → Save the comment `id` if present, you will EDIT it instead of creating a new one.

            3. Inspect the PR diff:
               `gh pr diff ${{ github.event.pull_request.number }}`

            4. For EACH issue found:
               - If `(file, line)` is already in the dedup map from step 2a → SKIP (do not post).
               - Otherwise, call `mcp__github_inline_comment__create_inline_comment` with severity emoji prefix (:red_circle: / :yellow_circle: / :large_blue_circle:).

            5. Post or update the summary:
               - If step 2b found an existing summary id, EDIT it:
                 `gh api -X PATCH "repos/${{ github.repository }}/issues/comments/<id>" -f body="<new summary>"`
               - Otherwise create a new one:
                 `gh pr comment ${{ github.event.pull_request.number }} --body "<summary>"`
               - The summary body MUST end with the SLACK_BRIEF footer in EXACTLY this format (HTML comment, lowercase keys, one value per line, must be the last block in the body):

                 ```
                 <!-- SLACK_BRIEF
                 verdict: REQUEST_CHANGES
                 critical: 2
                 warning: 5
                 info: 5
                 top_1: Sync-over-async deadlock (PaymentProcessor.cs:20) — .Result blocks
                 top_2: Off-by-one crash (product.service.ts:28) — i <= length
                 top_3: Swallowed exception (PaymentProcessor.cs:49) — catch(Exception) returns null
                 -->
                 ```

                 (Replace values with the actual review data. Counts reflect TOTAL current issues across the PR, not just this run.)

            Skip lockfiles, generated files, binaries.

            A failed review is one where you (a) post a duplicate inline comment on a line that was already commented, or (b) create a second summary comment instead of editing the existing one, or (c) skip the SLACK_BRIEF footer block, or (d) deviate from the exact SLACK_BRIEF key format.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 30
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh api:*),Read,Glob,Grep"

  notify:
    needs: review
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Extract review brief from PR comment
        id: brief
        if: needs.review.result == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e

          # Find the latest PR comment containing the SLACK_BRIEF marker
          body=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '[.[] | select(.body | contains("SLACK_BRIEF"))] | last | .body // empty')

          if [ -z "$body" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No PR comment with SLACK_BRIEF marker found"
            exit 0
          fi

          # Extract the SLACK_BRIEF block content (more tolerant: matches "SLACK_BRIEF" anywhere in line)
          brief=$(awk '/SLACK_BRIEF/,/-->/' <<< "$body")

          echo "::group::Debug — found comment body (first 500 chars)"
          printf '%s\n' "${body:0:500}"
          echo "::endgroup::"
          echo "::group::Debug — extracted SLACK_BRIEF block"
          printf '%s\n' "$brief"
          echo "::endgroup::"

          extract() {
            grep -oP "(?i)^\s*$1\s*:\s*\K.*" <<< "$brief" | head -1 | sed 's/[[:space:]]*$//'
          }

          verdict=$(extract verdict)
          critical=$(extract critical)
          warning=$(extract warning)
          info=$(extract info)
          top_1=$(extract top_1)
          top_2=$(extract top_2)
          top_3=$(extract top_3)

          case "$verdict" in
            APPROVE)         emoji=":large_green_circle:"; verdict_text="Approved" ;;
            COMMENT)         emoji=":yellow_circle:"; verdict_text="Comments" ;;
            REQUEST_CHANGES) emoji=":red_circle:"; verdict_text="Changes Requested" ;;
            *)               emoji=":grey_question:"; verdict_text="${verdict:-Unknown}" ;;
          esac

          # Escape quotes/backslashes for safe JSON embedding
          json_escape() {
            python3 -c "import json,sys; print(json.dumps(sys.stdin.read())[1:-1], end='')"
          }

          {
            echo "found=true"
            echo "verdict=$verdict"
            echo "verdict_text=$verdict_text"
            echo "verdict_emoji=$emoji"
            echo "critical=${critical:-0}"
            echo "warning=${warning:-0}"
            echo "info=${info:-0}"
            echo "top_1=$(printf '%s' "${top_1:-(none)}" | json_escape)"
            echo "top_2=$(printf '%s' "${top_2:-(none)}" | json_escape)"
            echo "top_3=$(printf '%s' "${top_3:-(none)}" | json_escape)"
          } >> "$GITHUB_OUTPUT"

      - name: Send Slack message
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": ":robot_face: Claude Code Review Complete",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<@U03CKA3NG3W> heads up: *${{ steps.brief.outputs.verdict_emoji || ':white_check_mark:' }} ${{ steps.brief.outputs.verdict_text || (needs.review.result == 'success' && 'Reviewed' || 'Review failed') }}* on <${{ github.event.pull_request.html_url }}|#${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}>"
                  }
                },
                {
                  "type": "divider"
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*:red_circle: Critical*\n${{ steps.brief.outputs.critical || '—' }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*:yellow_circle: Warning*\n${{ steps.brief.outputs.warning || '—' }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*:large_blue_circle: Info*\n${{ steps.brief.outputs.info || '—' }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author*\n${{ github.event.pull_request.user.login }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Top 3 issues to address:*\n1. ${{ steps.brief.outputs.top_1 || '_no review brief available_' }}\n2. ${{ steps.brief.outputs.top_2 || '_—_' }}\n3. ${{ steps.brief.outputs.top_3 || '_—_' }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "Open Pull Request",
                        "emoji": true
                      },
                      "url": "${{ github.event.pull_request.html_url }}",
                      "style": "${{ steps.brief.outputs.verdict == 'REQUEST_CHANGES' && 'danger' || 'primary' }}"
                    }
                  ]
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "Repo: `${{ github.repository }}` • Branch: `${{ github.event.pull_request.head.ref }}` → `${{ github.event.pull_request.base.ref }}`"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
